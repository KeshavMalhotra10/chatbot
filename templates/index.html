<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KeshavBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a25;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
      --accent: #7c6aff;
      --accent2: #ff6ab0;
      --accent3: #6affe0;
      --text: #f0eeff;
      --text-dim: rgba(240,238,255,0.45);
      --text-muted: rgba(240,238,255,0.22);
      --user-bubble: rgba(124,106,255,0.12);
      --bot-bubble: rgba(106,255,224,0.07);
      --glow: 0 0 40px rgba(124,106,255,0.15);
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124,106,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(106,255,224,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 90% 20%, rgba(255,106,176,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .logo-group { display: flex; align-items: center; gap: 14px; }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(90deg, var(--text) 0%, rgba(240,238,255,0.75) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text p {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 100px;
      background: rgba(106,255,224,0.07);
      border: 1px solid rgba(106,255,224,0.15);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent3);
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 6px var(--accent3);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    #chatbox {
      overflow-y: auto;
      padding: 28px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(124,106,255,0.2) transparent;
    }

    #chatbox::-webkit-scrollbar { width: 3px; }
    #chatbox::-webkit-scrollbar-track { background: transparent; }
    #chatbox::-webkit-scrollbar-thumb { background: rgba(124,106,255,0.25); border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 60px 20px;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    .empty-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 480px;
      margin-top: 10px;
    }

    .empty-suggestion {
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      font-family: 'Plus Jakarta Sans', sans-serif;
      line-height: 1.4;
    }

    .empty-suggestion:hover {
      border-color: var(--border-bright);
      background: var(--surface2);
      color: var(--text);
      transform: translateY(-1px);
    }

    .empty-suggestion .suggest-icon { font-size: 16px; margin-bottom: 6px; display: block; }

    .empty-title { font-size: 15px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.01em; }

    .msg-row {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      padding: 0 2px;
    }

    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.bot-avatar {
      background: linear-gradient(135deg, var(--accent) 0%, #5a49d4 100%);
      box-shadow: 0 2px 12px rgba(124,106,255,0.3);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: white;
      letter-spacing: 0.04em;
    }

    .avatar.user-avatar {
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      font-size: 12px;
      font-weight: 700;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
    }

    .bubble {
      max-width: min(75%, 600px);
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      font-weight: 400;
      position: relative;
    }

    .msg-row.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(124,106,255,0.2);
      border-bottom-right-radius: 5px;
      color: var(--text);
    }

    .msg-row.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid rgba(106,255,224,0.1);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }

    .bubble-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .msg-row.user .bubble-label { color: rgba(124,106,255,0.7); text-align: right; }
    .msg-row.bot .bubble-label  { color: rgba(106,255,224,0.6); }

    .bubble-text { font-family: 'Plus Jakarta Sans', sans-serif; }
    .bubble-text p { margin: 0; }

    /* Learn more button */
    .learn-more-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 13px;
      border-radius: 8px;
      background: rgba(106,255,224,0.08);
      border: 1px solid rgba(106,255,224,0.2);
      color: var(--accent3);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .learn-more-btn:hover {
      background: rgba(106,255,224,0.15);
      border-color: rgba(106,255,224,0.4);
      transform: translateY(-1px);
    }

    .learn-more-btn svg {
      width: 11px; height: 11px; flex-shrink: 0;
    }

    /* Typing indicator */
    #typingIndicator {
      display: none;
      gap: 12px;
      align-items: flex-start;
      padding: 0 2px;
      animation: fadeUp 0.3s ease both;
    }

    .typing-bubble {
      padding: 14px 18px;
      background: var(--bot-bubble);
      border: 1px solid rgba(106,255,224,0.1);
      border-radius: var(--radius);
      border-bottom-left-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .typing-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent3);
      animation: typingBounce 1.3s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    #inputArea {
      padding: 16px 0 24px;
      border-top: 1px solid var(--border);
    }

    .input-shell {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-shell:focus-within {
      border-color: rgba(124,106,255,0.4);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.07), var(--glow);
    }

    #message {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
      overflow-y: auto;
      padding: 4px 0;
      scrollbar-width: none;
    }

    #message::placeholder { color: var(--text-muted); }
    #message::-webkit-scrollbar { display: none; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent) 0%, #5a49d4 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px rgba(124,106,255,0.3);
    }

    .send-btn:hover { transform: translateY(-1px) scale(1.04); box-shadow: 0 4px 18px rgba(124,106,255,0.45); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; transform: translateX(1px); }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 4px 0;
    }

    .input-hint { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--text-muted); letter-spacing: 0.04em; }
    .char-count { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--text-muted); letter-spacing: 0.04em; transition: color 0.2s; }
    .char-count.warn { color: var(--accent2); }

    .bubble.error {
      border-color: rgba(255,100,100,0.2);
      background: rgba(255,80,80,0.07);
      color: rgba(255,150,150,0.9);
    }

    @media (max-width: 600px) {
      #app { padding: 0 12px; }
      header { padding: 16px 0 14px; }
      .empty-grid { grid-template-columns: 1fr; }
      .bubble { max-width: 88%; }
      .logo-text h1 { font-size: 17px; }
      .status-pill span { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo-group">
      <div class="logo-text">
        <h1>KeshavBot</h1>
        <p>AI Assistant · v2.0</p>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>Online</span>
    </div>
  </header>

  <div id="chatbox">
    <div class="empty-state" id="emptyState">
      <p class="empty-title">What can I help you with today?</p>
      <div class="empty-grid">
        <button class="empty-suggestion" onclick="fillSuggestion(this)">
          <span class="suggest-icon">✦</span>
          Explain a complex topic simply
        </button>
        <button class="empty-suggestion" onclick="fillSuggestion(this)">
          <span class="suggest-icon">⌘</span>
          Help me write or edit something
        </button>
        <button class="empty-suggestion" onclick="fillSuggestion(this)">
          <span class="suggest-icon">◈</span>
          Debug or review my code
        </button>
        <button class="empty-suggestion" onclick="fillSuggestion(this)">
          <span class="suggest-icon">◎</span>
          Brainstorm creative ideas
        </button>
      </div>
    </div>
  </div>

  <div id="typingIndicator">
    <div class="avatar bot-avatar">KB</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div id="inputArea">
    <div class="input-shell">
      <textarea
        id="message"
        placeholder="Message KeshavBot…"
        rows="1"
        maxlength="4000"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled title="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">↵ Enter to send · Shift+↵ new line</span>
      <span class="char-count" id="charCount">0 / 4000</span>
    </div>
  </div>
</div>

<script>
  const chatbox    = document.getElementById('chatbox');
  const input      = document.getElementById('message');
  const sendBtn    = document.getElementById('sendBtn');
  const typingInd  = document.getElementById('typingIndicator');
  const charCount  = document.getElementById('charCount');
  const emptyState = document.getElementById('emptyState');

  let isThinking = false;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    const len = input.value.length;
    charCount.textContent = `${len} / 4000`;
    charCount.classList.toggle('warn', len > 3500);
    sendBtn.disabled = !input.value.trim() || isThinking;
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  function fillSuggestion(el) {
    const icon = el.querySelector('.suggest-icon');
    const text = el.textContent.replace(icon ? icon.textContent : '', '').trim();
    input.value = text;
    input.dispatchEvent(new Event('input'));
    input.focus();
  }

  // Parses "Learn more: https://..." out of the bot reply
  function parseReply(raw) {
    const match = raw.match(/Learn more:\s*(https?:\/\/[^\s]+)/i);
    if (match) {
      return {
        text: raw.replace(/Learn more:\s*https?:\/\/[^\s]+/i, '').trim(),
        url: match[1]
      };
    }
    return { text: raw, url: null };
  }

  function appendMessage(role, rawText, isError = false) {
    if (emptyState && emptyState.parentNode === chatbox) {
      chatbox.removeChild(emptyState);
    }

    const { text, url } = role === 'bot' ? parseReply(rawText) : { text: rawText, url: null };

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}-avatar`;
    avatar.textContent = role === 'bot' ? 'KB' : 'U';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error' : '');

    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = role === 'user' ? 'You' : 'KeshavBot';

    const textEl = document.createElement('div');
    textEl.className = 'bubble-text';
    textEl.textContent = text;

    bubble.appendChild(label);
    bubble.appendChild(textEl);

    // Render "Learn more" button if a URL was found
    if (url) {
      const link = document.createElement('a');
      link.className = 'learn-more-btn';
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Learn more
      `;
      bubble.appendChild(link);
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatbox.appendChild(row);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatbox.scrollTo({ top: chatbox.scrollHeight, behavior: 'smooth' });
  }

  function setThinking(val) {
    isThinking = val;
    typingInd.style.display = val ? 'flex' : 'none';
    sendBtn.disabled = val || !input.value.trim();
    if (val) scrollToBottom();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isThinking) return;

    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    charCount.textContent = '0 / 4000';
    sendBtn.disabled = true;
    setThinking(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      setThinking(false);
      appendMessage('bot', data.reply || '(no response)');
    } catch (err) {
      setThinking(false);
      appendMessage('bot', `Something went wrong. ${err.message}`, true);
    }

    input.focus();
  }
</script>
</body>
</html>
