<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobFit — Resume Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --surface: #faf8f4;
      --ink: #1a1814;
      --ink-dim: #6b6760;
      --ink-faint: #b8b4ac;
      --border: #dedad3;
      --accent: #c8502a;
      --accent-light: #f5ede9;
      --green: #2d7a4f;
      --green-light: #e8f4ee;
      --yellow: #b07d1a;
      --yellow-light: #fdf5e0;
      --serif: 'Instrument Serif', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 13px;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      background: var(--surface);
    }
    header h1 {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-style: italic;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--ink-dim);
      font-size: 0.72rem;
    }
    .for-tag {
      margin-left: auto;
      font-size: 0.68rem;
      color: var(--ink-dim);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 2px;
    }

    /* LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    /* INPUT CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .char-count { font-size: 0.65rem; color: var(--ink-faint); }

    textarea {
      width: 100%;
      height: 320px;
      padding: 20px;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--ink);
      resize: none;
    }
    textarea::placeholder { color: var(--ink-faint); }

    .card-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hint { font-size: 0.65rem; color: var(--ink-faint); }

    button#analyze-btn {
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 10px 24px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, transform 0.1s;
    }
    button#analyze-btn:hover { background: var(--accent); }
    button#analyze-btn:active { transform: scale(0.98); }
    button#analyze-btn:disabled { background: var(--ink-faint); cursor: not-allowed; }

    /* RESULTS */
    #results { display: none; flex-direction: column; gap: 20px; }

    /* SCORE BLOCK */
    .score-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }
    .score-dial {
      flex-shrink: 0;
      width: 90px; height: 90px;
      position: relative;
    }
    .score-dial svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .score-dial circle {
      fill: none;
      stroke-width: 6;
    }
    .score-dial .track { stroke: var(--border); }
    .score-dial .fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .score-number {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: rotate(0deg);
    }
    .score-number span:first-child {
      font-family: var(--serif);
      font-size: 1.6rem;
      line-height: 1;
      color: var(--ink);
    }
    .score-number span:last-child { font-size: 0.58rem; color: var(--ink-dim); letter-spacing: 0.08em; }
    .score-text { flex: 1; }
    .score-text h2 {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-style: italic;
      margin-bottom: 8px;
    }
    .score-text p { color: var(--ink-dim); line-height: 1.7; font-size: 0.78rem; }

    /* MATCHES + KEYWORDS */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .list-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .list-card .card-header { background: var(--surface); }

    .match-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.76rem;
      line-height: 1.5;
      animation: fadeUp 0.3s ease both;
    }
    .match-item:last-child { border-bottom: none; }
    .match-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-top: 5px;
      flex-shrink: 0;
    }

    .kw-item {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.76rem;
      animation: fadeUp 0.3s ease both;
    }
    .kw-item:last-child { border-bottom: none; }
    .kw-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .kw-name { font-weight: 500; color: var(--ink); }
    .badge {
      font-size: 0.6rem;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge.high { background: #fde8e2; color: var(--accent); }
    .badge.medium { background: var(--yellow-light); color: var(--yellow); }
    .badge.low { background: var(--green-light); color: var(--green); }
    .kw-context { color: var(--ink-dim); font-size: 0.71rem; line-height: 1.5; }

    /* TIP */
    .tip-block {
      background: var(--accent-light);
      border: 1px solid #e8c4b8;
      border-radius: 4px;
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--ink);
    }
    .tip-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* RAG SOURCES */
    .sources-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .source-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .source-row:last-child { border-bottom: none; }
    .source-row:hover { background: var(--bg); }
    .source-rank { font-size: 0.65rem; color: var(--ink-faint); width: 16px; }
    .source-bar-wrap { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .source-bar { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.6s ease; }
    .source-score { font-size: 0.68rem; color: var(--ink-dim); width: 38px; text-align: right; }
    .source-preview {
      display: none;
      padding: 12px 20px 16px 48px;
      font-size: 0.72rem;
      color: var(--ink-dim);
      line-height: 1.65;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .source-row.open + .source-preview { display: block; }

    /* LOADING */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 20px;
      color: var(--ink-dim);
      font-size: 0.75rem;
    }
    .loader {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 800px) {
      .container { grid-template-columns: 1fr; padding: 20px; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>JobFit</h1>
  <p>Resume × Job Posting Analyzer</p>
  <div class="for-tag">Keshav Malhotra</div>
</header>

<div class="container">

  <!-- LEFT: Input -->
  <div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Job Posting</span>
        <span class="char-count" id="char-count">0 chars</span>
      </div>
      <textarea id="job-input" placeholder="Paste a job description here — full text works best. The more detail, the better the analysis."></textarea>
      <div class="card-footer">
        <span class="hint">RAG retrieves relevant resume sections · GPT scores the match</span>
        <button id="analyze-btn">Analyze →</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Results -->
  <div>
    <div id="loading">
      <div class="loader"></div>
      <span>Retrieving resume chunks & scoring match...</span>
    </div>

    <div id="results">

      <!-- Score -->
      <div class="score-block">
        <div class="score-dial">
          <svg viewBox="0 0 36 36">
            <circle class="track" cx="18" cy="18" r="15.9"/>
            <circle class="fill" id="score-arc" cx="18" cy="18" r="15.9"
              stroke-dasharray="100 100"
              stroke-dashoffset="100"/>
          </svg>
          <div class="score-number">
            <span id="score-num">—</span>
            <span>MATCH</span>
          </div>
        </div>
        <div class="score-text">
          <h2 id="score-label">Analyzing...</h2>
          <p id="score-reason"></p>
        </div>
      </div>

      <!-- Matches + Keywords -->
      <div class="two-col">
        <div class="list-card">
          <div class="card-header">
            <span class="card-title">✓ Strong Matches</span>
          </div>
          <div id="matches-list"></div>
        </div>
        <div class="list-card">
          <div class="card-header">
            <span class="card-title">⚠ Missing Keywords</span>
          </div>
          <div id="keywords-list"></div>
        </div>
      </div>

      <!-- Tip -->
      <div class="tip-block">
        <span class="tip-icon">→</span>
        <span id="ats-tip"></span>
      </div>

      <!-- RAG Sources -->
      <div class="sources-block">
        <div class="card-header">
          <span class="card-title">Retrieved Resume Chunks</span>
          <span class="char-count">click to expand</span>
        </div>
        <div id="sources-list"></div>
      </div>

    </div>
  </div>

</div>

<script>
  const textarea = document.getElementById('job-input');
  const btn = document.getElementById('analyze-btn');
  const charCount = document.getElementById('char-count');

  textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length + ' chars';
  });

  function scoreLabel(n) {
    if (n >= 80) return 'Strong fit';
    if (n >= 60) return 'Decent match';
    if (n >= 40) return 'Partial overlap';
    return 'Weak match';
  }

  function scoreColor(n) {
    if (n >= 70) return '#2d7a4f';
    if (n >= 45) return '#b07d1a';
    return '#c8502a';
  }

  btn.addEventListener('click', async () => {
    const text = textarea.value.trim();
    if (!text) return;

    btn.disabled = true;
    document.getElementById('results').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';

    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ job_posting: text })
      });
      const data = await res.json();
      if (data.error) { alert('Error: ' + data.error); return; }

      // Score dial
      const score = data.match_score;
      const circ = 2 * Math.PI * 15.9;
      const arc = document.getElementById('score-arc');
      const color = scoreColor(score);
      arc.style.stroke = color;
      arc.setAttribute('stroke-dasharray', `${circ} ${circ}`);
      arc.setAttribute('stroke-dashoffset', circ);
      setTimeout(() => {
        arc.style.transition = 'stroke-dashoffset 1s ease';
        arc.setAttribute('stroke-dashoffset', circ - (score / 100) * circ);
      }, 50);

      document.getElementById('score-num').textContent = score;
      document.getElementById('score-num').style.color = color;
      document.getElementById('score-label').textContent = scoreLabel(score);
      document.getElementById('score-reason').textContent = data.match_reasoning;

      // Matches
      const matchList = document.getElementById('matches-list');
      matchList.innerHTML = data.strong_matches.map((m, i) => `
        <div class="match-item" style="animation-delay:${i*60}ms">
          <div class="match-dot"></div>
          <span>${m}</span>
        </div>
      `).join('');

      // Keywords
      const kwList = document.getElementById('keywords-list');
      kwList.innerHTML = data.missing_keywords.map((k, i) => `
        <div class="kw-item" style="animation-delay:${i*60}ms">
          <div class="kw-top">
            <span class="kw-name">${k.keyword}</span>
            <span class="badge ${k.importance}">${k.importance}</span>
          </div>
          <div class="kw-context">${k.context}</div>
        </div>
      `).join('');

      // Tip
      document.getElementById('ats-tip').textContent = data.ats_tip;

      // Sources
      const srcList = document.getElementById('sources-list');
      srcList.innerHTML = data.sources.map((s, i) => `
        <div class="source-row" onclick="this.classList.toggle('open')">
          <span class="source-rank">#${i+1}</span>
          <div class="source-bar-wrap">
            <div class="source-bar" style="width:0%" data-pct="${Math.round(s.score*100)}"></div>
          </div>
          <span class="source-score">${s.score.toFixed(3)}</span>
        </div>
        <div class="source-preview">${s.chunk}</div>
      `).join('');

      setTimeout(() => {
        srcList.querySelectorAll('.source-bar').forEach(b => {
          b.style.width = b.dataset.pct + '%';
        });
      }, 100);

      document.getElementById('loading').style.display = 'none';
      const results = document.getElementById('results');
      results.style.display = 'flex';

    } catch(e) {
      alert('Network error — is the server running?');
    } finally {
      btn.disabled = false;
      document.getElementById('loading').style.display = 'none';
    }
  });
</script>
</body>
</html>
